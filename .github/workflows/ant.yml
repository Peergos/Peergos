name: Java CI

on: [push]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 25
    - name: Build with Ant
      run: ant -noinput -buildfile build.xml dist
    - name: GWT build
      run: ant -noinput -buildfile build.xml gwtc
    - name: install fuse 2 and gvfs
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt install -y libfuse2 gvfs gvfs-backends gvfs-fuse dbus-x11
        mkdir -p /run/user/$(id -u)
        eval $(dbus-launch --sh-syntax)
        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
        gvfsd &
        sleep 1
        gvfsd-fuse /run/user/$(id -u)/gvfs &
        sleep 2
    - name: Run tests
      timeout-minutes: 120
      run: ant -noinput -buildfile build.xml test
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-${{ matrix.os }}
        path: test.reports/**
        if-no-files-found: ignore
    - name: Reproducible build
      run: ./reproducible-test.sh
